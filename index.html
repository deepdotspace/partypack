<!DOCTYPE html>
<!--
  Party Pack — three party games, one room code. Jackbox-style hub on the
  DeepSpace SDK. Theme is the custom "LATE NIGHT" midnight-velvet palette baked
  into src/styles.css @theme (data-theme="latenight" has no override block, so
  the @theme baseline wins).
-->
<html lang="en" data-theme="latenight">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#15102b" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Type: Archivo (grotesque; heavy weights for the marquee / room code /
         titles) + Inter (everything you read: prompts, answers, UI) +
         Permanent Marker (Apache 2.0; player-written text on white cards). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <title>Party Pack — three games, one room code</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
